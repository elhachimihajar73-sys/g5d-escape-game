<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GESTION DE CAPTEURS/ACTIONNEURS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Gestion des capteurs et actionneurs</h1>

<div class="container">
    <details class="bloc">
        <summary>Etat du capteur de lumière (LDR)</summary>
        <p>Nom</p>
        <p>Etat actuel</p>
        <p>Valeur mesurée</p>
    </details>

    <details class="bloc">
        <summary>Etat du bouton</summary>
        <p>Nom</p>
        <p>Etat actuel</p>
        <p>Dernière action</p>
    </details>

    <details class="bloc">
        <summary>Actionneur LED</summary>
        <p>Nom</p>
        <p>Etat actuel</p>
        <p>Mode</p>
    </details>

    <details class="bloc">
        <summary>Conditions de déverrouillage</summary>
        <label>
            <input type="checkbox" id="conditionobscurite" checked disabled>
            Capteur dans l'obscurité
        </label>

        <label>
            <input type="checkbox" id="conditionEnigme1" disabled>
            Énigme 1 résolue
        </label>

        <label>
            <input type="checkbox" id="conditionEnigme2" disabled>
            Énigme 2 résolue
        </label>

        <label>
            <input type="checkbox" id="conditionEnigme3" disabled>
            Énigme 3 résolue
        </label>

        <label>
            <input type="checkbox" id="conditionEnigme4" disabled>
            Énigme 4 résolue
        </label>

        <label>
            <input type="checkbox" id="conditionBouton" disabled>
            Bouton appuyé
        </label>

    </details>

</div>

<script src="script.js"></script>
</body>
</html>
